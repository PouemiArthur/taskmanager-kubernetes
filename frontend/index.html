<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PJr Task Manager</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #6f6fe3;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 960px;
            margin: 0 auto;
            background: #a2a2b0;
            border-radius: 10px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 30px;
        }
        
        h1 {
            color: #e30e0e;
            margin-bottom: 30px;
            text-align: center;
        }
        
        .add-task {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        
        input, textarea {
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border 0.3s;
        }
        
        input:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        #taskTitle {
            flex: 1;
            min-width: 200px;
        }
        
        #taskDescription {
            width: 100%;
            min-height: 60px;
            resize: vertical;
        }
        
        button {
            padding: 12px 24px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: background 0.3s, transform 0.1s;
        }
        
        button:hover {
            background: #09261f;
            transform: translateY(-2px);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        .tasks-list {
            list-style: none;
        }
        
        .task-item {
            background: #f8f9fa;
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 10px;
            border-left: 4px solid #667eea;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .task-item:hover {
            transform: translateX(5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .task-item.completed {
            border-left-color: #51cf66;
            opacity: 0.7;
        }
        
        .task-title {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }
        
        .task-item.completed .task-title {
            text-decoration: line-through;
            color: #888;
        }
        
        .task-description {
            color: #666;
            margin-bottom: 12px;
            font-size: 14px;
        }
        
        .task-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            color: #999;
            margin-bottom: 12px;
        }
        
        .task-actions {
            display: flex;
            gap: 10px;
        }
        
        .btn-small {
            padding: 8px 16px;
            font-size: 12px;
        }
        
        .btn-complete {
            background: #51cf66;
        }
        
        .btn-complete:hover {
            background: #40c057;
        }
        
        .btn-delete {
            background: #ff6b6b;
        }
        
        .btn-delete:hover {
            background: #fa5252;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #667eea;
        }
        
        .error {
            background: #ffe0e0;
            color: #c92a2a;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        
        .stats {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        
        .stat-card {
            background: #1F2121;
            color: white;
            padding: 15px 30px;
            border-radius: 10px;
            text-align: center;
        }
        
        .stat-number {
            font-size: 32px;
            font-weight: bold;
        }
        
        .stat-label {
            font-size: 12px;
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>PJr Docker Task Manager</h1>
        
        <div class="stats">
            <div class="stat-card">
                <div class="stat-number" id="totalTasks">0</div>
                <div class="stat-label">Total Tasks</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="completedTasks">0</div>
                <div class="stat-label">Completed</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="pendingTasks">0</div>
                <div class="stat-label">Pending</div>
            </div>
        </div>
        
        <div class="add-task">
            <input type="text" id="taskTitle" placeholder="Task title..." />
            <button onclick="addTask()">Add Task</button>
        </div>
        
        <textarea id="taskDescription" placeholder="Task description (optional)..."></textarea>
        
        <div id="error" class="error" style="display: none;"></div>
        <div id="loading" class="loading" style="display: none;">Loading tasks...</div>
        
        <ul id="tasksList" class="tasks-list"></ul>
    </div>

    <script>
        const API_URL = '/api';  // Nginx will proxy this to backend

        async function fetchTasks() {
            try {
                document.getElementById('loading').style.display = 'block';
                const response = await fetch(`${API_URL}/tasks`);
                const tasks = await response.json();
                document.getElementById('loading').style.display = 'none';
                renderTasks(tasks);
                updateStats(tasks);
            } catch (error) {
                showError('Failed to load tasks: ' + error.message);
                document.getElementById('loading').style.display = 'none';
            }
        }

        function updateStats(tasks) {
            const total = tasks.length;
            const completed = tasks.filter(t => t.completed).length;
            const pending = total - completed;
            
            document.getElementById('totalTasks').textContent = total;
            document.getElementById('completedTasks').textContent = completed;
            document.getElementById('pendingTasks').textContent = pending;
        }

        function renderTasks(tasks) {
            const list = document.getElementById('tasksList');
            list.innerHTML = '';
            
            if (tasks.length === 0) {
                list.innerHTML = '<p style="text-align: center; color: #999; padding: 40px;">No tasks yet. Add one above!</p>';
                return;
            }
            
            tasks.forEach(task => {
                const li = document.createElement('li');
                li.className = `task-item ${task.completed ? 'completed' : ''}`;
                
                const createdDate = task.created_at ? new Date(task.created_at).toLocaleString() : 'N/A';
                const updatedDate = task.updated_at ? new Date(task.updated_at).toLocaleString() : 'N/A';
                
                li.innerHTML = `
                    <div class="task-title">${escapeHtml(task.title)}</div>
                    ${task.description ? `<div class="task-description">${escapeHtml(task.description)}</div>` : ''}
                    <div class="task-meta">
                        <span>Created: ${createdDate}</span>
                        <span>Updated: ${updatedDate}</span>
                    </div>
                    <div class="task-actions">
                        <button class="btn-small btn-complete" onclick="toggleTask(${task.id}, ${!task.completed})">
                            ${task.completed ? '↩️ Undo' : '✓ Complete'}
                        </button>
                        <button class="btn-small btn-delete" onclick="deleteTask(${task.id})">
                             Delete
                        </button>
                    </div>
                `;
                list.appendChild(li);
            });
        }

        async function addTask() {
            const title = document.getElementById('taskTitle').value.trim();
            const description = document.getElementById('taskDescription').value.trim();
            
            if (!title) {
                showError('Please enter a task title');
                return;
            }
            
            try {
                const response = await fetch(`${API_URL}/tasks`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title, description })
                });
                
                if (response.ok) {
                    document.getElementById('taskTitle').value = '';
                    document.getElementById('taskDescription').value = '';
                    fetchTasks();
                } else {
                    showError('Failed to add task');
                }
            } catch (error) {
                showError('Failed to add task: ' + error.message);
            }
        }

        async function toggleTask(id, completed) {
            try {
                const response = await fetch(`${API_URL}/tasks/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ completed })
                });
                
                if (response.ok) {
                    fetchTasks();
                } else {
                    showError('Failed to update task');
                }
            } catch (error) {
                showError('Failed to update task: ' + error.message);
            }
        }

        async function deleteTask(id) {
            if (!confirm('Are you sure you want to delete this task?')) return;
            
            try {
                const response = await fetch(`${API_URL}/tasks/${id}`, {
                    method: 'DELETE'
                });
                
                if (response.ok) {
                    fetchTasks();
                } else {
                    showError('Failed to delete task');
                }
            } catch (error) {
                showError('Failed to delete task: ' + error.message);
            }
        }

        function showError(message) {
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 5000);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Allow Enter key to add task
        document.getElementById('taskTitle').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addTask();
        });

        // Load tasks on page load
        fetchTasks();
    </script>
</body>
</html>
